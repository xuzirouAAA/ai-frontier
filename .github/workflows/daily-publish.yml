name: 🤖 AI 每日更新

on:
  schedule:
    # 每天北京时间 09:00-11:00 之间执行（UTC 01:00-03:00）
    - cron: '0 1 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  daily-publish:
    name: 生成并发布文章
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 安装依赖
        run: npm ci --no-optional

      - name: 运行 AI 每日管线
        env:
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
          AI_PROVIDER: agnes
          MIN_ARTICLES: 1
          MAX_ARTICLES: 3
        run: npx tsx scripts/daily-pipeline.ts 2>&1 | tail -20

      - name: 提交并推送新文章
        run: |
          git config user.name "AI 前沿资讯 Bot"
          git config user.email "bot@ai-frontier.vercel.app"
          git add data/articles/
          if git diff --cached --quiet; then
            echo "没有新文章需要提交"
            exit 0
          fi
          git commit -m "🤖 AI 每日更新 $(date +'%Y-%m-%d')"
          git push
